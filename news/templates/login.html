<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0d6efd;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #222;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        .input-group input:focus {
            border-color: #0d6efd;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #0b5ed7;
        }

        .forgot {
            text-align: left;
            margin-top: 5px;
        }

        .forgot a {
            font-size: 14px;
            color: #0d6efd;
        }

        .signup {
            margin-top: 15px;
        }

        .signup a {
            color: #0d6efd;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="username" name="username" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password">
            </div>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>
            <br>

            <button type="submit" class="btn-login">Login</button>

            <div class="signup">
                Need an account? <a href="{% url 'register' %}">Sign up!</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
