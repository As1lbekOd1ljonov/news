<!--navbar css-->
<style>
/* ===== Navbar container ===== */
.navbar-container {
  width: 100%;
  font-family: 'Segoe UI', sans-serif;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  position: relative;
  z-index: 100;
}

/* Navbar top */
.navbar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 50px;
}

/* Logo */
.logo a {
  display: flex;
  align-items: center;
  transition: transform 0.3s;
}
.logo a:hover { transform: scale(1.05); }

/* Search */
.search { flex: 1; display: flex; justify-content: center; position: relative; }
.search input {
  width: 350px; padding: 8px 40px 8px 15px; border-radius: 25px;
  border: 1px solid #ccc; outline: none; transition: 0.3s;
}
.search input:focus { border-color: #0d47a1; box-shadow: 0 0 8px rgba(13,71,161,0.3); }
.search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; }

/* User area */
.user-area { display: flex; align-items: center; gap: 12px; }

/* Avatar */
.avatar-small { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; object-fit: cover; transition: transform 0.2s; }
.avatar-small:hover { transform: scale(1.1); }

/* User dropdown */
.user-menu { position: relative; }
.logout-dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 55px;
  background: #fff;
  border-radius: 12px;
  min-width: 220px;
  padding: 12px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  z-index: 1000;
}
.logout-dropdown.show { display: block; }

/* Close X */
.dropdown-close { position: absolute; top: 6px; right: 10px; font-size: 20px; cursor: pointer; color: #9ca3af; }
.dropdown-close:hover { color: #dc2626; }

/* User info inside dropdown */
.user-info { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; margin-bottom: 6px; }
.user-info span { font-weight: 600; font-size: 14px; }

/* Menu items */
.logout-dropdown .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; text-decoration: none; color: #374151; transition: all 0.2s; }
.logout-dropdown .menu-item:hover { background: #f3f4f6; color: #0d47a1; }
.logout-dropdown .menu-item.logout { color: #dc2626; }
.logout-dropdown .menu-item.logout:hover { background: #fee2e2; }

/* Categories */
.navbar-bottom { background: #f4f6f8; border-top: 1px solid #e0e0e0; }
.category-list { display: flex; justify-content: center; gap: 30px; list-style: none; padding: 12px 0; margin: 0; }
.category-list a { position: relative; text-decoration: none; color: #333; font-weight: 500; padding: 5px 0; transition: 0.3s; }
.category-list a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 3px; background-color: #0d47a1; transition: width 0.3s; }
.category-list a:hover::after { width: 100%; }

/* Auth buttons */
.user-area .btn { font-size: 16px; font-weight: 600; padding: 8px 20px; border-radius: 999px; transition: all 0.25s ease; text-decoration: none; }
.user-area .btn-primary { background: linear-gradient(135deg, #0d47a1, #1565c0); border: none; color: #fff; box-shadow: 0 10px 16px rgba(13,71,161,0.3); }
.user-area .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(13,71,161,0.4); }
.user-area .btn-outline-primary { border: 2px solid #0d47a1; color: #0d47a1; background: transparent; }
.user-area .btn-outline-primary:hover { background: #0d47a1; color: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,71,161,0.35); }



</style>

<!--news_list css-->
<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f5f7;
  color: #111;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== CONTAINER ===== */
.container {
  max-width: calc(100% - 400px); /* ekranning har ikki chetidan 200px qochadi */
  margin: 20px auto;
  padding: 0 10px;
}

/* ===== MAIN GRID ===== */
.main-grid {
  display: flex;
  gap: 20px;
  align-items: flex-start; /* sidebar va content yuqorisidan boshlanadi */
}

/* ===== TOP NEWS ===== */
.top-news {
  display: flex;
  flex-direction: row-reverse;
  gap: 30px;
  background: #fff;
  padding: 16px; /* biroz kattaroq padding */
  border-radius: 2px;
  margin-bottom: 20px;
}

.top-image {
  flex: 0 0 400px; /* rasm kattaroq */
  height: 300px;    /* rasm balandligi oshdi */
  overflow: hidden;
  border-radius: 8px;
}

.top-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.top-text h1 {
  font-size: 30px; /* kattaroq sarlavha */
  margin-bottom: 6px;
}

.top-text p {
  font-size: 20px;
  color: #555;
  line-height: 1.4;
}

/* ===== MEDIUM NEWS GRID ===== */
.news-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.news-card {
  display: flex;
  flex-direction: row-reverse; /* matn chap, rasm o‘ng */
  background: #fff;
  border-radius: 2px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  transition: transform 0.15s;
  gap: 12px;
  height: 140px;
}

.news-card:hover {
  transform: translateY(-2px);
}

.news-card .news-img {
  flex: 0 0 170px; /* rasm kattaroq */
  height: 100%;
  overflow: hidden;
  border-radius: 4px 0 0 4px;
    padding:  10px;
}

.news-card .news-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;

}

.news-card .news-text {
  flex: 1;
  padding: 10px 12px;
}

.news-card .news-text h5 {
  font-size: 16px; /* sarlavha kattaroq */
  margin-bottom: 4px;
}

.news-card .news-text p {
  font-size: 13px;
  color: #555;
  line-height: 1.3;
}

/* ===== MANY NEWS LIST ===== */
.news-list-grid {
  display: grid;
  grid-template-columns: 700px 375px;
  gap: 24px;
  align-items: start;
}

.urgent-news {
  background: #fff;
  padding: 15px;
  border-radius: 2px;
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
  margin-top: 20px;
}

.urgent-news h4 {
  margin-bottom: 18px;
  font-size: 25px;
  border-bottom: 2px solid #d32f2f;
  padding-bottom: 8px;
}

.urgent-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.urgent-card {
  display: block;
  padding: 12px;
  background: #f9f9f9;
  border-left: 4px solid #d32f2f;
  border-radius: 4px;
  font-size: 25px;
  color: #111;
  text-decoration: none;
  line-height: 1.4;
}

.urgent-card:hover {
  background: #f1f1f1;
}


.news-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 700px;
  margin: 20px 0 20px 0px; /* chap tomondan 100px, biroz ko‘proq */
  padding: 10px;
  background: #fff;
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
}


/* Yangilik kartalari */
.news-card {
  display: flex;
  gap: 15px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 15px;
}

.news-card:last-child {
  border-bottom: none;
}

/* Rasm */
.news-img img {
  width: 150px;
  height: 100px;
  object-fit: cover;
  border-radius: 5px;
}

/* Matn */
.news-text h5 {
  margin-bottom: 5px;
  font-size: 18px;
}

.news-text p {
  font-size: 14px;
  color: #555;
  margin: 0;
}



/* ===== SIDEBAR ===== */
.sidebar {
  background: #fff;
  padding: 12px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  width: 350px;
  flex-shrink: 0;
}


.side-news-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow: hidden;
  max-height: 500px; /* dastlabki balandlik */
  transition: max-height 0.5s ease; /* uzayish animatsiyasi */
}


.sidebar h3 {
  font-size: 16px;
  margin-bottom: 8px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
}

/* Side news card */
.side-card {
  display: flex;
  flex-direction: row;
  gap: 8px;
  align-items: flex-start;
}

.side-card .side-img {
  flex: 0 0 80px; /* rasm kattaroq */
  height: 80px;
  border-radius: 4px;
  overflow: hidden;
}

.side-card .side-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.side-card .side-text {
  flex: 1;
}

.side-card .side-text h5 {
  font-size: 14px;
  margin-bottom: 2px;
}

.side-card .side-text p {
  font-size: 12px;
  color: #555;
  line-height: 1.2;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr; /* sidebar pastga tushadi */
  }
  .news-grid {
    grid-template-columns: 1fr; /* 1 ustun */
  }
}
    .sidebar .side-card {
  padding: 10px 0;      /* ichki bo‘sh joy */
  border-bottom: 1px solid #ccc; /* pastki chiziq */
  margin-bottom: 10px;  /* chiziq va keyingi yangilik orasida bo‘sh joy */
}

/* Oxirgi yangilik ostida chiziq chiqmasligi uchun */
.sidebar .side-card:last-child {
  border-bottom: none;
  margin-bottom: 0;
}

    a{
  color: #000;              /* oddiy holat — qora */
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover{
  color: #2563eb;           /* mishka borganda — ko‘k */
}




</style>
