<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

/* ===== BODY ===== */
body{
  background:#f9fafb;
  color:#111827;
  min-height:100vh;
}

/* ===== WRAPPER ===== */
.wrapper{
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:#f3f4f6;
  padding:30px 20px;
  width:280px;
  border-right:1px solid #d1d5db;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  margin:0 auto;
  overflow:hidden;
  background:#e5e7eb;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.sidebar h3{
  text-align:center;
  margin-top:15px;
}

.role{
  text-align:center;
  font-size:13px;
  color:#6b7280;
}

/* ===== SIDEBAR CARDS ===== */
.profile-info{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.profile-info .card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

.profile-info span{
  font-size:12px;
  color:#6b7280;
}

.profile-info p{
  font-weight:600;
}

/* ===== SIDEBAR BUTTON ===== */
.sidebar a{
  display:block;
  margin-top:30px;
  background:#38bdf8;
  color:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
}

/* ===== CONTENT ===== */
.content{
  flex:1;
  padding:40px;
}

/* ===== EDIT PROFILE CENTER ===== */
.edit-profile-wrapper{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:40px;
}

/* ===== FORM ===== */
.form-container{
  background:#ffffff;
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:500px;
  border:1px solid #e5e7eb;
}

.form-container h2{
  text-align:center;
  margin-bottom:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
  margin-bottom:15px;
}

.form-group label{
  font-size:14px;
  color:#6b7280;
  margin-bottom:5px;
}

.form-group input{
  padding:10px;
  border-radius:10px;
  border:1px solid #d1d5db;
}

.form-group img{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-top:10px;
  object-fit:cover;
}

button{
  width:100%;
  padding:12px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
}

.cancel-btn{
  display:block;
  margin-top:10px;
  text-align:center;
  background:#9ca3af;
  color:white;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .wrapper{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
    border-right:none;
    border-bottom:1px solid #d1d5db;
  }
}


  /* ===== CONTENT AREA ===== */
.content{
  flex:1;
  padding:40px;
  background:#ffffff; /* to‘liq oq fon */
}

/* ===== ADMIN HEADER ===== */
.admin-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.admin-header h3{
  font-size:22px;
  font-weight:700;
  color:#111827;
}

/* Add button */
.add{
  background:#2563eb;
  color:#ffffff;
  padding:8px 16px;
  border-radius:10px;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
}

.add:hover{
  background:#1d4ed8;
}

/* ===== NEWS LIST ===== */
.news{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  overflow:hidden;
}

/* News item */
.news-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid #e5e7eb;
}

.news-item:last-child{
  border-bottom:none;
}

.news-item p{
  font-size:15px;
  font-weight:500;
  color:#111827;
}

/* Actions */
.actions a{
  margin-left:12px;
  font-size:16px;
  text-decoration:none;
  color:#6b7280;
}

.actions a:hover{
  color:#111827;
}

/* ===== USER INFO (oddiy user) ===== */
.content .profile-info{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.content .profile-info .card{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:16px;
}

.content .profile-info span{
  font-size:12px;
  color:#6b7280;
}

.content .profile-info p{
  margin-top:6px;
  font-size:15px;
  font-weight:600;
  color:#111827;
}

  /* ===== FORM ===== */
.form-container{
  background:#ffffff;
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:520px;
  border:1px solid #e5e7eb;
}

.form-container h2{
  text-align:center;
  margin-bottom:20px;
  font-size:22px;
  font-weight:700;
  color:#111827;
}

.form-group{
  display:flex;
  flex-direction:column;
  margin-bottom:15px;
}

.form-group label{
  font-size:14px;
  color:#6b7280;
  margin-bottom:6px;
}

.form-group input,
.form-group textarea,
.form-group select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#f9fafb;
  color:#111827;
  font-size:14px;
}

.form-group textarea{
  min-height:120px;
  resize:vertical;
}

button{
  width:100%;
  padding:12px;
  background:#22c55e;
  color:#ffffff;
  border:none;
  border-radius:10px;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}


  /* ===== DELETE CONFIRM ===== */
.delete-box{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:30px;
  max-width:500px;
  max-height: 300px;
  margin:60px auto;
  text-align:center;
}

.delete-box h2{
  color:#dc2626;
  margin-bottom:15px;
}

.delete-box p{
  color:#374151;
  margin-bottom:25px;
  font-size:15px;
}

button.danger{
  background:#ef4444;
  color:white;
}

button.danger:hover{
  background:#dc2626;
}


</style>
