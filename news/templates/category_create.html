{% extends 'base_profil.html' %}

{% block content %}
<main class="content">

  <div class="edit-profile-wrapper">
    <div class="form-container">
      <h2>Create Category</h2>

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          {{ form.title.label_tag }}
          {{ form.title }}
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Save</button>
          <a href="{% url 'profile' %}" class="btn-cancel">Cancel</a>
        </div>

      </form>
    </div>
  </div>

</main>

<style>
    .form-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:20px;
}

.btn-save{
  background:#2563eb;
  color:#fff;
  padding:10px 18px;
  border-radius:8px;
  border:none;
  font-weight:600;
  cursor:pointer;
}

.btn-cancel{
  background:#e5e7eb;
  color:#111827;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

.btn-cancel:hover{
  background:#d1d5db;
}

</style>
{% endblock %}
